<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>考研规划配置｜库洛米学习助手</title>
    <style>
        * { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            background: linear-gradient(145deg, #f7e9f0 0%, #e8d5e0 50%, #dcc0cd 100%);
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 200, 220, 0.3), transparent 60%),
                        radial-gradient(circle at 70% 80%, rgba(200, 150, 200, 0.25), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }
        .kuromi-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #3d1f2e;
            text-shadow: 0 4px 0 #d9a5b3, 0 6px 12px rgba(0,0,0,0.1);
            letter-spacing: 2px;
            margin-bottom: 20px;
            position: relative;
        }
        .kuromi-title::after { content: "🖤🎀"; font-size: 1.8rem; margin-left: 10px; }
        .kuromi-title::before { content: "💀"; font-size: 1.8rem; margin-right: 10px; }
        .card-kuromi {
            background: rgba(255, 248, 250, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 30px 30px 30px 8px;
            border: 2px solid #a86b7e;
            box-shadow: 0 8px 0 #7a4b5c, 0 12px 24px rgba(90, 40, 60, 0.2);
            padding: 18px 16px;
            margin-bottom: 18px;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }
        .card-kuromi::after {
            content: "💀";
            position: absolute;
            bottom: 6px;
            right: 12px;
            font-size: 1.2rem;
            opacity: 0.15;
            transform: rotate(10deg);
            pointer-events: none;
        }
        .card-kuromi:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #7a4b5c, 0 16px 32px rgba(90, 40, 60, 0.25); }
        .card-title-kuromi {
            font-size: 1.2rem;
            font-weight: 700;
            color: #4a2736;
            border-bottom: 2px dashed #c98da3;
            padding-bottom: 8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title-kuromi span { font-size: 1.5rem; }
        .form-control-kuromi {
            background: #fff8fa;
            border: 2px solid #d9b3c2;
            border-radius: 20px;
            padding: 10px 14px;
            font-size: 0.95rem;
            color: #2d1a22;
            transition: 0.2s;
            margin-bottom: 12px;
            width: 100%;
        }
        .form-control-kuromi:focus {
            border-color: #a85772;
            box-shadow: 0 0 0 4px rgba(168, 87, 114, 0.25);
            outline: none;
            background: #fff;
        }
        .form-control-kuromi::placeholder { color: #b08898; font-weight: 300; }
        .btn-kuromi {
            background: linear-gradient(145deg, #f7b6cb, #e489a6);
            border: 2px solid #a85772;
            border-radius: 40px;
            color: #2d1a22;
            font-weight: 700;
            padding: 10px 18px;
            box-shadow: 0 5px 0 #7a4b5c;
            transition: all 0.08s linear;
            width: 100%;
            font-size: 1rem;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
        }
        .btn-kuromi:active { transform: translateY(4px); box-shadow: 0 1px 0 #7a4b5c; }
        .btn-kuromi-outline {
            background: transparent;
            border: 2px solid #a85772;
            border-radius: 40px;
            color: #4a2736;
            font-weight: 700;
            padding: 6px 14px;
            box-shadow: 0 3px 0 #7a4b5c;
            transition: 0.08s linear;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-kuromi-outline:active { transform: translateY(3px); box-shadow: 0 0px 0 #7a4b5c; }
        .tip-text {
            font-size: 0.85rem;
            color: #88596b;
            margin-bottom: 10px;
        }
        label {
            font-weight: 600;
            color: #4a2736;
            margin-bottom: 4px;
            display: inline-block;
        }
        .d-flex { display: flex; gap: 12px; }
        .flex-fill { flex: 1; }
        .justify-content-center { justify-content: center; }
        .mb-3 { margin-bottom: 16px; }

        @media (max-width: 576px) {
            .kuromi-title { font-size: 1.6rem; }
            .kuromi-title::before, .kuromi-title::after { font-size: 1.2rem; }
            .btn-kuromi { font-size: 0.9rem; padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="kuromi-title">考研规划配置</div>

        <div class="card-kuromi">
            <div class="card-title-kuromi"><span>🕒</span> 基础核心配置（自定义填空）</div>
            <p class="tip-text">自主填写所有备考参数，系统将根据你的数据自动倒推全阶段学习规划，对接主页学习数据动态校准</p>

            <label>备考所有科目（逗号分隔填写，例：数学二、英语一、政治、专业课）</label>
            <input type="text" class="form-control-kuromi" id="user_subjects" placeholder="请手动填写你的全部考研科目">

            <label>冲刺启动日期（真题/模拟卷正式刷题起始日）</label>
            <input type="date" class="form-control-kuromi" id="user_sprint_date">

            <label>每日有效纯学习时长（小时，仅填数字，例：6.5）</label>
            <input type="number" step="0.5" min="1" max="12" class="form-control-kuromi" id="user_daily_hour" placeholder="填写每日固定学习时长">
        </div>

        <div class="card-kuromi">
            <div class="card-title-kuromi"><span>📋</span> 任务量化配置（完全自定义）</div>
            <p class="tip-text">填写各科目当前阶段总任务量，系统精准拆解到每日，替代旧批量导入功能</p>

            <label>数学总任务量（例：高数强化习题600道、线代错题200道）</label>
            <textarea class="form-control-kuromi" rows="2" id="math_task" placeholder="详细填写数学待完成总任务与总量"></textarea>

            <label>英语总任务量（例：05-18年阅读28篇、单词5500二轮背诵）</label>
            <textarea class="form-control-kuromi" rows="2" id="english_task" placeholder="详细填写英语待完成总任务与总量"></textarea>

            <label>政治总任务量（例：1000题全刷、马原毛中特强化复盘）</label>
            <textarea class="form-control-kuromi" rows="2" id="politics_task" placeholder="详细填写政治待完成总任务与总量"></textarea>

            <label>专业课总任务量（例：参考书一轮精读、课后题全刷、考点笔记整理）</label>
            <textarea class="form-control-kuromi" rows="2" id="major_task" placeholder="详细填写专业课待完成总任务与总量"></textarea>
        </div>

        <div class="card-kuromi">
            <div class="card-title-kuromi"><span>⚙️</span> 个性化适配配置</div>

            <label>每周缓冲复盘天数（用于补进度、查漏补缺，仅填数字）</label>
            <input type="number" class="form-control-kuromi" id="user_buffer_day" placeholder="默认推荐1天" value="1">

            <label>学习时段偏好（自定义作息安排）</label>
            <input type="text" class="form-control-kuromi" id="user_time_prefer" placeholder="例：上午数学、下午专业课、晚间英语政治复盘">

            <label>薄弱科目/重点突破方向</label>
            <input type="text" class="form-control-kuromi" id="user_weak_subject" placeholder="填写需要重点补强的科目/知识点">
        </div>

        <button class="btn-kuromi mb-3" id="save_all_config">✅ 保存配置并生成全套考研规划</button>

        <div class="d-flex gap-2 justify-content-center">
            <a href="/plan/today" class="btn-kuromi-outline flex-fill">查看今日考研任务</a>
            <a href="/" class="btn-kuromi-outline flex-fill">返回学习助手首页</a>
        </div>
    </div>

    <script>
        document.getElementById('save_all_config').addEventListener('click', function(){
            const configData = {
                subjects: document.getElementById('user_subjects').value.trim(),
                sprint_date: document.getElementById('user_sprint_date').value,
                daily_hour: parseFloat(document.getElementById('user_daily_hour').value) || 0,
                math_task: document.getElementById('math_task').value.trim(),
                english_task: document.getElementById('english_task').value.trim(),
                politics_task: document.getElementById('politics_task').value.trim(),
                major_task: document.getElementById('major_task').value.trim(),
                buffer_day: parseInt(document.getElementById('user_buffer_day').value) || 1,
                time_prefer: document.getElementById('user_time_prefer').value.trim(),
                weak_subject: document.getElementById('user_weak_subject').value.trim()
            };

            if(!configData.subjects || !configData.sprint_date || !configData.daily_hour){
                alert('请完善核心配置：科目、冲刺日期、每日学习时长！');
                return;
            }

            fetch("/plan/save_full_config", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(configData)
            }).then(res => res.json()).then(ret => {
                if(ret.success){
                    alert('🎉 规划配置保存成功！系统已联动你的学习记录，生成个性化备考方案！');
                    window.location.href = "/plan/today";
                }else{
                    alert(ret.msg || '配置保存失败，请重试！');
                }
            }).catch(() => {
                alert('网络异常，请重试！');
            });
        });
    </script>
</body>
</html>
